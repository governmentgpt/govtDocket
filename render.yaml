services:
  - type: web
    name: govt-docket-ui
    runtime: static
    branch: main
    buildCommand: echo "GovGPT static UI — no build step required"
    staticPublishPath: .
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
